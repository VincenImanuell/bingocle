# Render Blueprint — one-click deploy of the two side services (agent + bot).
# Contracts are already on Mantle Sepolia; the frontend deploys on Vercel.
#
# Usage: push to GitHub, then Render Dashboard → New → Blueprint → pick this repo.
# Set the secret env vars (sync:false) in the dashboard after the first deploy.
#
# Notes:
#  - The agent is a `web` service: it binds $PORT and gets a public HTTPS URL.
#    Put that URL into the frontend (NEXT_PUBLIC_AGENT_API) and capability (AGENT_API_URL).
#  - The Telegram bot uses long polling (no inbound port), so it is a `worker`.
#    Render workers are not on the free tier — Railway/Fly/a small VPS also work
#    and may be cheaper for an always-on bot.
services:
  - type: web
    name: bingocle-agent
    runtime: docker
    dockerfilePath: ./agent/Dockerfile
    dockerContext: ./agent
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8787"
      - key: CHAIN_ID
        value: "5003"
      - key: MANTLE_RPC_URL
        value: https://rpc.sepolia.mantle.xyz
      - key: CORS_ORIGIN
        value: "*"
      - key: GEMINI_API_KEY
        sync: false
      - key: AGENT_PRIVATE_KEY
        sync: false
      - key: EVENT_FACTORY_ADDRESS
        value: "0x4ded43273E1b3be15bBBF1A5cE9494f77B045Afb"
      - key: WORD_POOL_ADDRESS
        value: "0x1F0BebC4D0f7C4B8428Ac2FE14BBeb2178e63C29"
      - key: WORD_MARKET_ADDRESS
        value: "0x2a853222d57d28a713F45b8F78503376ccF5471b"
      - key: ORACLE_REGISTRY_ADDRESS
        value: "0xe998c6F467876b2dA1C5D126EA5576A6943c2073"
      - key: BINGO_CARD_NFT_ADDRESS
        value: "0x1A7643b31EfD272F65fe7D8653fE35172284A1F3"
      - key: REWARD_VAULT_ADDRESS
        value: "0x0B0766bF126180730E408105C35A761D7AADe968"
      - key: AGENT_IDENTITY_ADDRESS
        value: "0x6EC7E9AE2dD88fAe0F1851487Fbd15F0b89382A0"

  - type: worker
    name: bingocle-capability
    runtime: docker
    dockerfilePath: ./capability/Dockerfile
    dockerContext: ./capability
    plan: starter
    envVars:
      - key: CHAIN_ID
        value: "5003"
      - key: MANTLE_RPC_URL
        value: https://rpc.sepolia.mantle.xyz
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DEMO_WALLET_MNEMONIC
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AGENT_API_URL
        sync: false # set to the deployed bingocle-agent public URL
      - key: EVENT_FACTORY_ADDRESS
        value: "0x4ded43273E1b3be15bBBF1A5cE9494f77B045Afb"
      - key: WORD_POOL_ADDRESS
        value: "0x1F0BebC4D0f7C4B8428Ac2FE14BBeb2178e63C29"
      - key: WORD_MARKET_ADDRESS
        value: "0x2a853222d57d28a713F45b8F78503376ccF5471b"
      - key: ORACLE_REGISTRY_ADDRESS
        value: "0xe998c6F467876b2dA1C5D126EA5576A6943c2073"
      - key: BINGO_CARD_NFT_ADDRESS
        value: "0x1A7643b31EfD272F65fe7D8653fE35172284A1F3"
      - key: REWARD_VAULT_ADDRESS
        value: "0x0B0766bF126180730E408105C35A761D7AADe968"
      - key: AGENT_IDENTITY_ADDRESS
        value: "0x6EC7E9AE2dD88fAe0F1851487Fbd15F0b89382A0"
